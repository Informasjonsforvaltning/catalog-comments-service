logging:
  level.root: WARN
  level.no: ${LOG_LEVEL:DEBUG}
  level.org.springframework: WARN
  level.org.springframework.web: WARN
  level.org.apache.jena: ERROR
server:
  port: 8080
application.cors.originPatterns: "${CORS_ORIGIN_PATTERNS}"
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST}:5432/${POSTGRESQL_DB:catalog_comments}
    username: ${POSTGRESQL_USER}
    password: ${POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security.oauth2.resourceserver.jwt:
    jwk-set-uri: ${OIDC_JWKS:https://auth.staging.fellesdatakatalog.digdir.no/realms/fdk/protocol/openid-connect/certs}
    issuer-uri: ${OIDC_ISSUER:https://auth.staging.fellesdatakatalog.digdir.no/realms/fdk}
---
spring:
  config.activate.on-profile: develop
  security.oauth2.resourceserver.jwt.jwk-set-uri: https://auth.staging.fellesdatakatalog.digdir.no/realms/fdk/protocol/openid-connect/certs
  datasource:
    url: jdbc:postgresql://localhost:5432/catalog_comments
    username: admin
    password: admin
application.cors.originPatterns: "*"
---
spring:
  config.activate.on-profile: integration-test
  security.oauth2.resourceserver.jwt.jwk-set-uri: http://localhost:5050/auth/realms/fdk/protocol/openid-connect/certs
application.cors.originPatterns: "*"
